# XcodeGen spec. Regenerate the Xcode project with `xcodegen generate`
# (run from the `ui/` directory). The generated MIRA.xcodeproj is a build
# artifact — gitignore it so we don't fight merge conflicts on the
# project file.

name: MIRA
options:
  bundleIdPrefix: ai.mira
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  MIRA:
    type: application
    platform: macOS
    sources:
      - path: MIRA
        excludes:
          - "Info.plist"
    info:
      path: MIRA/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: MIRA
        CFBundleDisplayName: MIRA
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSMicrophoneUsageDescription: "MIRA listens for the wake word and your commands."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.mira.hud
        PRODUCT_NAME: MIRA
        GENERATE_INFOPLIST_FILE: NO
        # Signing to "Sign to Run Locally" so you can build without an
        # Apple Developer account. Flip to manual + a real team when
        # you're ready to notarize + distribute.
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        # Sandbox on, outgoing client only. The HUD just talks to the
        # loopback WebSocket; no files, no incoming connections.
        ENABLE_APP_SANDBOX: YES
