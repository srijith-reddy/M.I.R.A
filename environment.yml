name: mira-voice-assistant
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip>=24.2
  - ffmpeg
  - pyaudio
  - numpy
  - requests
  - faiss-cpu=1.9.0
  - pip:
      # Core LLM + OpenAI
      - openai>=1.99.2,<2.0.0
      - tiktoken==0.8.0

      # LangChain ecosystem
      - langchain==0.3.7
      - langchain-community==0.3.7
      - langchain-openai==0.3.2
      - langgraph==0.2.38

      # Browser automation
      - browser-use==0.7.7
      - playwright==1.55.0   # needed for browser-use

      # Voice + Audio
      - webrtcvad-wheels==2.0.14
      - sounddevice==0.5.1
      - pvporcupine==3.0.5
      - soundfile==0.13.0

      # Utils & Logging
      - python-dotenv==1.0.1
      - google-api-python-client>=2.174.0
      - google-auth>=2.40.3
      - google-auth-oauthlib>=1.2.2
      - google-auth-httplib2==0.2.0

      # Optional extras
      - cartesia==2.0.8          # if using Cartesia TTS
      - websocket-client==1.8.0 # for realtime TTS
      - beautifulsoup4==4.12.3  # for scraping
      - setuptools<81
      - brotli==1.1.0

